<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AR Scanner - CMS</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; color: white; }
        .overlay { position: absolute; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; }
        .fallback { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1e293b; z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hidden { display: none !important; }
        a { color: #3b82f6; text-decoration: none; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>

    <!-- Fallback UI for Missing Camera Permissions -->
    <div class="fallback hidden" id="fallback">
        <h2>Camera Error</h2>
        <p>Camera access is unavailable or was denied.</p>
        <p id="fallbackData">Please check device settings.</p>
        <a href="/">← Back to Dashboard</a>
    </div>

    <!-- AR UI Overlay -->
    <div class="overlay" id="overlay">
        <h3 style="margin-top:0;">AR Scanner Active</h3>
        <p id="status" style="color: #f0c040;">Point camera at Hiro marker...</p>
        <div id="dataPanel">Loading tool data...</div>
        <a href="/">← Exit AR</a>
    </div>

    <!-- The AR.js Scene -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" id="arScene">
        <!-- We are using the Hiro marker as required by the lab -->
        <a-marker preset="hiro" id="hiroMarker">
            <a-box position="0 0.5 0" scale="0.8 0.8 0.8" color="#4CC3D9" opacity="0.9"></a-box>
            <a-text id="arText" value="Scanning..." position="0 1.4 0" align="center" color="#ffffff" scale="1.5 1.5 1.5"></a-text>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script type="module" src="/static/ar.js"></script>
</body>
</html>
