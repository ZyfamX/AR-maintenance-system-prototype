<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Maintenance System</title>
    
    <!-- AR.js and A-Frame Libraries (Required for later) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-view" class="view-container login-overlay">
        <div class="login-card">
            <h1>Maintenance Login</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" style="min-height: 48px;">Login</button> <!-- NF1: 48px touch target -->
            </form>
            <div id="login-error" style="color: #ff5555;"></div>
        </div>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="dashboard-view" class="view-container dashboard-layout hidden">
        
        <header>
            <div class="header-logo" style="display: flex; align-items: center;">
                <!-- NEW: The Hamburger Button -->
                <button id="btn-menu-toggle" class="menu-toggle-btn">≡</button>
                <span>⚙️ CMS: AR SYSTEM</span>
            </div>
            <div class="header-controls"></div>
        </header>

        <nav class="sidebar">
            <button class="nav-item active">DASHBOARD</button>
            <button class="nav-item">ACTIVE FAULTS</button>
            <button class="nav-item">TOOL LOG</button>
            
            <!-- Pushes the logout button to the bottom -->
            <div class="sidebar-spacer"></div>
            
            <div class="logout-container">
                <button id="btn-logout" class="logout-btn" title="Logout">
                    <span class="logout-icon">👤</span>
                    <span>Log out</span>
                </button>
            </div>
        </nav>

        <main class="main-content">
            <!-- KPI Row -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <span class="kpi-title">Active Faults</span>
                    <span class="kpi-value text-orange" id="kpi-faults">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-title">Tools Deployed</span>
                    <span class="kpi-value text-blue" id="kpi-tools">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-title">System Health</span>
                    <span class="kpi-value text-green">GOOD</span>
                </div>
            </div>

            <!-- Tables Row -->
            <div class="tables-row">
                <!-- Faults Table -->
                <div class="table-card">
                    <h3 style="margin-top: 0;">LIVE ACTIVE FAULTS</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>FAULT ID</th>
                                <th>TITLE</th>
                                <th>LOCATION</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="faults-table-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Tools Table -->
                <div class="table-card">
                    <h3 style="margin-top: 0;">TOOL TRACKING LOG</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>TOOL ID</th>
                                <th>TYPE</th>
                                <th>STATUS</th>
                                <th>CURRENT USER</th>
                            </tr>
                        </thead>
                        <tbody id="tools-table-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="fab-container">
                <a href="/ar" id="btn-launch-ar" class="fab-ar" title="Launch AR Scanner">📷</a>
            </div>
        </main>
    </div>

    <!-- Your JavaScript Logic -->
    <script type="module" src="/static/api.js"></script>
    <script type="module" src="/static/main.js"></script>
    <script type="module" src="/static/ui.js"></script>
    <script type="module" src="/static/ar_engine.js"></script>
</body>
</html>
