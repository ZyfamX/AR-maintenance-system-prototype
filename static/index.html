<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Maintenance System</title>
    
    <!-- AR.js and A-Frame Libraries (Required for later) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Custom CSS -->
    <style>
        /* Base styles & Accessibility (NF1, NF3) */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e293b; color: #f8fafc; overflow-x: hidden; }
        .hidden { display: none !important; }
        .view-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Buttons */
        button { min-height: 48px; min-width: 48px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #2563eb; }
        
        /* Layout Grid for the Dashboard */
        .dashboard-layout {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main";
            grid-template-rows: 60px 1fr;
            grid-template-columns: 200px 1fr;
            height: 100vh;
        }

        /* Header */
        header { grid-area: header; background-color: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #334155; }
        .header-logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }
        .header-controls { display: flex; gap: 15px; }
        .account-btn { background: transparent; border: 1px solid #64748b; border-radius: 50%; }

        /* Sidebar */
        .sidebar { grid-area: sidebar; background-color: #1e293b; border-right: 2px solid #334155; padding-top: 20px; }
        .nav-item { padding: 15px 20px; display: block; width: 100%; text-align: left; background: transparent; border: none; color: #cbd5e1; font-size: 1rem; border-radius: 0; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background-color: #334155; color: white; border-left-color: #3b82f6; }

        /* Main Content Area */
        .main-content { grid-area: main; padding: 20px; overflow-y: auto; background-color: #0f172a; }
        
        /* KPI Cards */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; display: flex; flex-direction: column; }
        .kpi-title { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-value { font-size: 2.5rem; font-weight: bold; }
        .text-orange { color: #f97316; } /* Colorblind safe orange */
        .text-blue { color: #3b82f6; }
        .text-green { color: #22c55e; }

        /* Tables Area */
        .tables-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .table-card { background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; }
        th { border-bottom: 2px solid #334155; padding: 10px; color: #94a3b8; font-size: 0.85rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        
        /* Status Badges */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .badge-active { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .badge-assigned { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .badge-resolved { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

        /* Media Query for Mobile (NF5) */
        @media (max-width: 768px) {
            .dashboard-layout { grid-template-areas: "header" "main"; grid-template-columns: 1fr; }
            .sidebar { display: none; } /* Hide sidebar on small phones, would need a hamburger menu later */
            .tables-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-view" class="view-container interactive">
        <h1>Maintenance Login</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="min-height: 48px;">Login</button> <!-- NF1: 48px touch target -->
        </form>
        <div id="login-error" style="color: #ff5555;"></div>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="dashboard-view" class="view-container dashboard-layout hidden">
        
        <header>
            <div class="header-logo">⚙️ CMS: AR SYSTEM</div>
            <div class="header-controls">
                <button id="btn-launch-ar" style="background: #f97316;">📷 Launch AR</button>
                <!-- User Account / Logout Button -->
                <button id="btn-logout" class="account-btn" title="Logout">👤</button>
            </div>
        </header>

        <nav class="sidebar">
            <button class="nav-item active">DASHBOARD</button>
            <button class="nav-item">ACTIVE FAULTS</button>
            <button class="nav-item">TOOL LOG</button>
        </nav>

        <main class="main-content">
            <!-- KPI Row -->
            <div class="kpi-row">
                <div class="kpi-card">
                    <span class="kpi-title">Active Faults</span>
                    <span class="kpi-value text-orange" id="kpi-faults">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-title">Tools Deployed</span>
                    <span class="kpi-value text-blue" id="kpi-tools">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-title">System Health</span>
                    <span class="kpi-value text-green">GOOD</span>
                </div>
            </div>

            <!-- Tables Row -->
            <div class="tables-row">
                <!-- Faults Table -->
                <div class="table-card">
                    <h3 style="margin-top: 0;">LIVE ACTIVE FAULTS</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>FAULT ID</th>
                                <th>TITLE</th>
                                <th>LOCATION</th>
                                <th>STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="faults-table-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>

                <!-- Tools Table -->
                <div class="table-card">
                    <h3 style="margin-top: 0;">TOOL TRACKING LOG</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>TOOL ID</th>
                                <th>TYPE</th>
                                <th>STATUS</th>
                                <th>CURRENT USER</th>
                            </tr>
                        </thead>
                        <tbody id="tools-table-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- SCREEN 3: AR SCANNER -->
    <div id="ar-view" class="view-container hidden">
        
        <!-- UI Overlay on top of the camera -->
        <div id="ui-layer" class="view-container">
            <button id="btn-home" class="interactive" style="min-height: 48px; margin: 10px;">🏠 Dashboard</button> <!-- Requirement F16 -->
            <div id="ar-status-text" style="background: rgba(0,0,0,0.7); padding: 10px;">Scanning for markers...</div>
        </div>

        <!-- The actual A-Frame/AR.js Scene -->
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <!-- Markers will go here later -->
            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <!-- Your JavaScript Logic -->
    <script type="module" src="/static/api.js"></script>
    <script type="module" src="/static/main.js"></script>
    <script type="module" src="/static/ui.js"></script>
    <script type="module" src="/static/ar_engine.js"></script>
</body>
</html>
