<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Maintenance System</title>
    
    <!-- AR.js and A-Frame Libraries (Required for later) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Your Custom CSS -->
    <style>
        /* Base styles for Accessibility (NF1, NF3) */
        body { margin: 0; font-family: sans-serif; background-color: #121212; color: #ffffff; }
        .hidden { display: none !important; }
        .view-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Dashboard UI above the AR layer */
        #ui-layer { z-index: 1000; position: absolute; pointer-events: none; }
        .interactive { pointer-events: auto; }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-view" class="view-container interactive">
        <h1>Maintenance Login</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="min-height: 48px;">Login</button> <!-- NF1: 48px touch target -->
        </form>
        <div id="login-error" style="color: #ff5555;"></div>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="dashboard-view" class="view-container interactive hidden">
        <header>
            <h2>Supervisor Dashboard</h2>
            <button id="btn-logout" style="min-height: 48px;">Logout</button>
        </header>
        <main>
            <!-- Faults and Tools tables will go here -->
            <button id="btn-launch-ar" style="min-height: 48px;">Launch AR Scanner</button>
        </main>
    </div>

    <!-- SCREEN 3: AR SCANNER -->
    <div id="ar-view" class="view-container hidden">
        
        <!-- UI Overlay on top of the camera -->
        <div id="ui-layer" class="view-container">
            <button id="btn-home" class="interactive" style="min-height: 48px; margin: 10px;">🏠 Dashboard</button> <!-- Requirement F16 -->
            <div id="ar-status-text" style="background: rgba(0,0,0,0.7); padding: 10px;">Scanning for markers...</div>
        </div>

        <!-- The actual A-Frame/AR.js Scene -->
        <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
            <!-- Markers will go here later -->
            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <!-- Your JavaScript Logic -->
    <script type="module" src="/static/api.js"></script>
    <script type="module" src="/static/main.js"></script>
    <script type="module" src="/static/ui.js"></script>
    <script type="module" src="/static/ar_engine.js"></script>
</body>
</html>
