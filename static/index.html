<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Maintenance System</title>
    
    <!-- AR.js and A-Frame Libraries (Required for later) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Custom CSS -->
    <style>
        /* Base styles & Accessibility (NF1, NF3) */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: radial-gradient(circle at top left, #2c3e50, #0f172a); color: #f8fafc; overflow-x: hidden; }
        .hidden { display: none !important; }
        .view-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Buttons */
        button { min-height: 48px; min-width: 48px; cursor: pointer; background: #3b82f6; color: #0f172a; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #60a5fa; }
        
        /* Layout Grid for the Dashboard */
        .dashboard-layout {
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main";
            grid-template-rows: 60px 1fr;
            grid-template-columns: 200px 1fr;
            height: 100vh;
        }

        /* Header */
        header { grid-area: header; background-color: #0f172a; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid #334155; }
        .header-logo { font-size: 1.2rem; font-weight: bold; letter-spacing: 1px; }
        .header-controls { display: flex; gap: 15px; }
        .account-btn { background: transparent; border: 1px solid #64748b; border-radius: 50%; }

        /* Sidebar */
        .menu-toggle-btn { display: none; background: transparent; border: none; color: white; font-size: 2rem; cursor: pointer; min-width: 48px; min-height: 48px; padding: 0; margin-right: 10px;text-align: center; }
        .sidebar { grid-area: sidebar; background-color: #0f172a; border-right: 1px solid #334155; padding-top: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 15px 20px; display: block; width: 100%; text-align: left; background: transparent; border: none; color: #cbd5e1; font-size: 1rem; border-radius: 0; border-left: 4px solid transparent; }
        .nav-item:hover, .nav-item.active { background-color: #334155; color: white; border-left-color: #3b82f6; }

        /* Main Content Area */
        .main-content { grid-area: main; padding: 20px 20px 100px 20px; overflow-y: auto; background-color: #0f172a; }
        
        /* Two-Column Dashboard Layout */
        .dashboard-columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
        .column { display: flex; flex-direction: column; gap: 20px; }


        /* KPI Cards */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .kpi-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; }
        .kpi-title { font-size: 0.85rem; color: #cbd5e1; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-value { font-size: 2.5rem; font-weight: bold; }
        .text-orange { color: #fdba74; } /* AAA Compliant Brighter Orange */
        .text-blue { color: #93c5fd; } /* AAA Compliant Brighter Blue */
        .text-green { color: #86efac; } /* AAA Compliant Brighter Green */

        /* Tables Area */
        .table-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); overflow-x: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; }
        th { border-bottom: 2px solid #334155; padding: 10px; color: #cbd5e1; font-size: 0.85rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        
        /* Status Badges */
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; white-space: nowrap; display: inline-block; text-align: center;}
        .badge-active { background: rgba(249, 115, 22, 0.2); color: #fdba74; } 
        .badge-assigned { background: rgba(59, 130, 246, 0.2); color: #93c5fd; } 
        .badge-resolved { background: rgba(34, 197, 94, 0.2); color: #86efac; } 
        .badge-review { background: rgba(168, 85, 247, 0.2); color: #d8b4fe; } 
        
        /* Priority Badges */
        .badge-high { background: rgba(225, 29, 72, 0.2); color: #fda4af; }    /* AAA Brighter Rose */
        .badge-medium { background: rgba(217, 119, 6, 0.2); color: #fcd34d; }  /* AAA Brighter Amber */
        .badge-low { background: rgba(71, 85, 105, 0.2); color: #cbd5e1; }     /* AAA Slate Gray */
        
        /* Tool Status Badges */
        .badge-available { background: rgba(34, 197, 94, 0.2); color: #86efac; } /* AAA Brighter Green */
        .badge-out { background: rgba(100, 116, 139, 0.2); color: #cbd5e1; }     /* AAA Muted Slate */

        /* Logout Styles */
        .sidebar-spacer { flex-grow: 1; } /* Pushes everything below this to the very bottom */
        .logout-container { padding: 20px; text-align: center; border-top: 1px solid #334155; }
        .logout-btn { background: transparent; border: none; color: #cbd5e1; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; font-size: 0.9rem; }
        .logout-btn:hover { color: white; }
        .logout-icon { font-size: 1.5rem; background: #334155; padding: 10px; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }

        /* Floating AR Button (FAB) */
        .fab-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .fab-ar { display: flex; align-items: center; justify-content: center; width: 70px; height: 70px; background-color: #f97316; color: white; border-radius: 50%; text-decoration: none; font-size: 2rem; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4); transition: transform 0.2s, background-color 0.2s; }
        .fab-ar:hover { transform: translateX(-50%) scale(1.05); background-color: #ea580c; }

        
        /* Media Query for Mobile (NF5) */
        @media (max-width: 768px) {
            .dashboard-layout { grid-template-areas: "header" "main"; grid-template-columns: 1fr; }
            .tables-row { grid-template-columns: 1fr; }
            
            /* Show the hamburger menu on small screens */
            .menu-toggle-btn { display: block; }
            
            /* Transform sidebar into a mobile drawer */
            .sidebar { 
                position: fixed; 
                top: 60px; /* Starts right below the header */
                left: -250px; /* Hides it off-screen to the left */
                width: 250px; 
                height: calc(100vh - 60px); 
                z-index: 2000; 
                transition: left 0.3s ease-in-out; /* Smooth sliding animation */
                box-shadow: 4px 0 15px rgba(0,0,0,0.5);
            }
            
            /* This class will be added by JavaScript to open the menu */
            .sidebar.open { left: 0; }
        }
    </style>
</head>
<body>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-view" class="view-container interactive">
        <h1>Maintenance Login</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="min-height: 48px;">Login</button> <!-- NF1: 48px touch target -->
        </form>
        <div id="login-error" style="color: #ff5555;"></div>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="dashboard-view" class="view-container dashboard-layout hidden">
        
        <header>
            <div class="header-logo" style="display: flex; align-items: center;">
                <!-- NEW: The Hamburger Button -->
                <button id="btn-menu-toggle" class="menu-toggle-btn">≡</button>
                <span>⚙️ CMS: AR SYSTEM</span>
            </div>
            <div class="header-controls"></div>
        </header>

        <nav class="sidebar">
            <button class="nav-item active">DASHBOARD</button>
            <button class="nav-item">ALL FAULTS</button>
            <button class="nav-item">ALL TOOLS</button>
            
            <!-- Pushes the logout button to the bottom -->
            <div class="sidebar-spacer"></div>
            
            <div class="logout-container">
                <button id="btn-logout" class="logout-btn" title="Logout">
                    <span class="logout-icon">👤</span>
                    <span>Log out</span>
                </button>
            </div>
        </nav>

        <main class="main-content">
            <div class="dashboard-columns">
                
                <!-- LEFT COLUMN: FAULTS -->
                <div class="column">
                    <div class="kpi-row">
                        <div class="kpi-card">
                            <span class="kpi-title">Active Faults</span>
                            <span class="kpi-value text-orange" id="kpi-active">0</span>
                        </div>
                        <div class="kpi-card">
                            <span class="kpi-title">Faults To Review</span>
                            <span class="kpi-value" style="color: #a855f7;" id="kpi-review">0</span>
                        </div>
                        <div class="kpi-card">
                            <span class="kpi-title">Faults In-Progress</span>
                            <span class="kpi-value text-blue" id="kpi-progress">0</span>
                        </div>
                    </div>

                    <div class="table-card">
                        <h3 style="margin-top: 0;">LIVE FAULTS</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>FAULT ID</th>
                                    <th>TITLE</th>
                                    <th>LOCATION</th>
                                    <th>PRIORITY</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="faults-table-body">
                                <!-- Populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- RIGHT COLUMN: TOOLS -->
                <div class="column">
                    <div class="kpi-row">
                        <div class="kpi-card">
                            <span class="kpi-title">Tools Checked-Out</span>
                            <span class="kpi-value text-orange" id="kpi-tools-out">0</span>
                        </div>
                        <div class="kpi-card">
                            <span class="kpi-title">Tools Available</span>
                            <span class="kpi-value text-green" id="kpi-tools-avail">0</span>
                        </div>
                    </div>

                    <div class="table-card">
                        <h3 style="margin-top: 0;">TOOL TRACKING LOG</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>TOOL ID</th>
                                    <th>TYPE</th>
                                    <th>STATUS</th>
                                    <th>CURRENT USER</th>
                                </tr>
                            </thead>
                            <tbody id="tools-table-body">
                                <!-- Populated by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <!-- Floating AR Button -->
            <div class="fab-container">
                <a href="/ar" id="btn-launch-ar" class="fab-ar" title="Launch AR Scanner">📷</a>
            </div>
        </main>
    </div>

    <!-- Your JavaScript Logic -->
    <script type="module" src="/static/api.js"></script>
    <script type="module" src="/static/main.js"></script>
    <script type="module" src="/static/ui.js"></script>
</body>
</html>
